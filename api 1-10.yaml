components:
  schemas:
    App:
      type: object
      properties:
        buildType:
          type: string
          enum:
            - ''
        compiledAt:
          type: string
          enum:
            - ''
        dirty:
          type: boolean
          enum:
            - false
        gitCommit:
          type: string
          enum:
            - ''
        modelVersion:
          type: integer
          enum:
            - 0
          format: int32
        productName:
          type: string
          enum:
            - ''
        productVersion:
          type: string
          enum:
            - ''
      required:
        - buildType
        - compiledAt
        - dirty
        - gitCommit
        - modelVersion
        - productName
        - productVersion
    Capabilities:
      type: object
      properties:
        canvasHeight:
          type: integer
          enum:
            - 0
          format: int32
        canvasWidth:
          type: integer
          enum:
            - 0
          format: int32
        ioBoard:
          type: string
          enum:
            - ''
        numIpAudioInputs:
          type: integer
          enum:
            - 0
          format: int32
        numIpAudioOutputs:
          type: integer
          enum:
            - 0
          format: int32
        numIpDataInputs:
          type: integer
          enum:
            - 0
          format: int32
        numIpDataOutputs:
          type: integer
          enum:
            - 0
          format: int32
        numIpVideoInputs:
          type: integer
          enum:
            - 0
          format: int32
        numIpVideoOutputs:
          type: integer
          enum:
            - 0
          format: int32
        numPips:
          type: integer
          enum:
            - 0
          format: int32
        numSdiInputs:
          type: integer
          enum:
            - 0
          format: int32
        numSdiOutputs:
          type: integer
          enum:
            - 0
          format: int32
      required:
        - canvasHeight
        - canvasWidth
        - ioBoard
        - numIpAudioInputs
        - numIpAudioOutputs
        - numIpDataInputs
        - numIpDataOutputs
        - numIpVideoInputs
        - numIpVideoOutputs
        - numPips
        - numSdiInputs
        - numSdiOutputs
    SelfGet:
      type: object
      properties:
        app:
          $ref: '#/components/schemas/App'
        capabilities:
          $ref: '#/components/schemas/Capabilities'
      required:
        - app
        - capabilities
    Uuid:
      type: string
      enum:
        - 00000000-0000-0000-0000-000000000000
    SnapshotInfo:
      type: object
      properties:
        lastErrorMessage:
          type: string
        snapshots:
          type: array
          items:
            $ref: '#/components/schemas/Uuid'
        state:
          type: string
          enum:
            - idle
            - creating snapshot
            - updating snapshot
            - deleting snapshot
            - exporting snapshot
            - importing snapshot
            - syncing snapshots
            - not enough storage space
            - export failed
            - import failed
        totalStorageBytes:
          type: integer
          format: int32
        usedStorageBytes:
          type: integer
          format: int32
      required:
        - lastErrorMessage
        - snapshots
        - state
        - totalStorageBytes
        - usedStorageBytes
    MetadataGet:
      type: object
      properties:
        checksum:
          type: string
          enum:
            - ''
        deleted:
          type: boolean
          enum:
            - false
        description:
          type: string
          enum:
            - ''
        name:
          type: string
          enum:
            - ''
        path:
          type: string
          enum:
            - ''
        shared:
          type: boolean
          enum:
            - false
        sizeBytes:
          type: integer
          format: int32
        timestamp:
          type: integer
          format: int32
        type:
          type: string
          enum:
            - snapshot
            - file
        uuid:
          $ref: '#/components/schemas/Uuid'
      required:
        - checksum
        - deleted
        - description
        - name
        - path
        - shared
        - sizeBytes
        - timestamp
        - type
        - uuid
    GenericApiMessage:
      type: object
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string
      required:
        - code
        - message
    StorageFilePreview:
      type: object
      properties:
        data:
          type: string
          enum:
            - Returns full model captured in file
      required:
        - data
    MetadataChange:
      type: object
      properties:
        deleted:
          type: boolean
          enum:
            - false
        description:
          type: string
          enum:
            - ''
        name:
          type: string
          enum:
            - ''
        path:
          type: string
          enum:
            - ''
        shared:
          type: boolean
          enum:
            - false
        timestamp:
          type: integer
          format: int32
        type:
          type: string
          enum:
            - snapshot
            - file
        uuid:
          $ref: '#/components/schemas/Uuid'
      required:
        - deleted
        - description
        - name
        - path
        - shared
        - timestamp
        - type
        - uuid
    SnapshotRestoreHead:
      type: object
      properties:
        snapshotHeadUuid:
          $ref: '#/components/schemas/Uuid'
        targetHeadUuid:
          $ref: '#/components/schemas/Uuid'
      required:
        - snapshotHeadUuid
        - targetHeadUuid
    SnapshotRestore:
      type: object
      properties:
        restoreAppearanceHeadTemplates:
          type: boolean
        restoreAppearanceProtocol:
          type: boolean
        restoreAppearanceWidgetTemplates:
          type: boolean
        restoreGlobalSettings:
          type: boolean
        restoreHeads:
          type: boolean
        restoreHeadsPartial:
          type: array
          items:
            $ref: '#/components/schemas/SnapshotRestoreHead'
        restoreImageVideo:
          type: boolean
        restoreInputs:
          type: boolean
        restoreNmos:
          type: boolean
        restoreOutputsIp:
          type: boolean
        restoreOutputsSdi:
          type: boolean
        restorePatternGenerator:
          type: boolean
        restoreReference:
          type: boolean
        restoreTSL:
          type: boolean
      required:
        - restoreAppearanceHeadTemplates
        - restoreAppearanceProtocol
        - restoreAppearanceWidgetTemplates
        - restoreGlobalSettings
        - restoreHeads
        - restoreHeadsPartial
        - restoreImageVideo
        - restoreInputs
        - restoreNmos
        - restoreOutputsIp
        - restoreOutputsSdi
        - restorePatternGenerator
        - restoreReference
        - restoreTSL
    SnapshotImportInput:
      type: object
      properties:
        data:
